version: "3.8"
services:
  # DuckDB Service
  duckdb:
    build:
      context: .
      dockerfile: docker/duckdb/Dockerfile
    volumes:
      - .:/orx-surgdatahub
    ports:
      - "8001:8001"
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    environment:
      - S3_ENDPOINT=minio:9000  # Configure the endpoint for MinIO service
      - S3_USE_SSL=false
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    depends_on:
      - minio
    networks:
      - minio_network

  # MinIO Service
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - minio_network

volumes:
  minio_data:

networks:
  minio_network: