##############################################################
## Docker Compose File for DuckDB, MinIO, and Dagster Services
##
## MinIO and DuckDB pull directly from upstream registries; the dagster,
## datorcloud-cli, and python-runner images come from Docker Hub
## (jagh1729/*). For air-gapped installs you can still preload local
## tarballs via `docker load -i docker/<image>.tar`.
##
## To start the stack:
##   docker compose up -d
##
## To connect to the services:
##   DuckDB         docker exec -it duckdb duckdb
##                  (distroless image — no shell available)
##   MinIO          docker exec -it minio mc
##   Dagster        docker exec -it dagster bash
##   DatorCloud CLI docker exec -it datorcloud-cli bash
##   Python runner  docker exec -it python-runner bash
##
## To stop:
##   docker compose down
##############################################################


services:
  # -----------------------------------------------------
  # DuckDB Service
  # -----------------------------------------------------
  duckdb:
    image: duckdb/duckdb:latest
    container_name: duckdb
    volumes:
      - .:/orx-surgdatahub
    stdin_open: true
    tty: true
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USE_SSL=${S3_USE_SSL}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      - minio
    networks:
      - minio_network

  # -----------------------------------------------------
  # MinIO Service
  # -----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ${DATA_WAREHOUSE_PATH}:/data
    ports:
      - "${MINIO_API_PORT}:9090"
      - "${MINIO_CONSOLE_PORT}:9091"
    command: server /data --console-address ":9091" --address ":9090"
    networks:
      - minio_network

  # -----------------------------------------------------
  # Dagster Service
  # -----------------------------------------------------
  dagster:
    image: dagster:latest
    container_name: dagster
    volumes:
      - ./:/app/workspace
      - ${DATA_LAKE_PATH}:/app/data_lake
      - ${RETRIEVED_DATA_PATH}:/app/retrieved_data
    ports:
      - "${DAGSTER_PORT:-3030}:3030"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USE_SSL=${S3_USE_SSL}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - DATA_LAKE_PATH=/app/data_lake
      - RETRIEVED_DATA_PATH=/app/retrieved_data
    networks:
      - minio_network

  # -----------------------------------------------------
  # Python Runner Service (Ubuntu 22.04 + Python 3.10)
  # -----------------------------------------------------
  python-runner:
    image: jagh1729/dms-python-service:latest 
    container_name: python-runner
    depends_on:
      - duckdb
      - minio
      - dagster
    networks:
      - minio_network
    tty: true
    stdin_open: true
    command: ["/bin/sh", "-c", "tail -f /dev/null"]
    volumes:
      - ./:/app
      - ${DATA_LAKE_PATH}:/app/data_lake
      - ${RETRIEVED_DATA_PATH}:/app/retrieved_data
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USE_SSL=${S3_USE_SSL}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - DATA_LAKE_PATH=/app/data_lake
      - RETRIEVED_DATA_PATH=/app/retrieved_data
      - DAGSTER_HOST=dagster
      - DAGSTER_PORT=3030

  # -----------------------------------------------------
  # DatorCloud CLI Service
  # -----------------------------------------------------
  datorcloud-cli:
    image: jagh1729/datorcloud-cli:latest
    container_name: datorcloud-cli
    depends_on:
      - duckdb
      - minio
      - dagster
    networks:
      - minio_network
    tty: true
    stdin_open: true
    command: ["/bin/sh", "-c", "tail -f /dev/null"]
    volumes:
      - ./:/app
      - ${DATA_LAKE_PATH}:/app/data_lake
      - ${RETRIEVED_DATA_PATH}:/app/retrieved_data
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USE_SSL=${S3_USE_SSL}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - DATA_LAKE_PATH=/app/data_lake
      - RETRIEVED_DATA_PATH=/app/retrieved_data
      - DAGSTER_HOST=dagster
      - DAGSTER_PORT=3030


# volumes:
#   minio_data:

networks:
  minio_network:
