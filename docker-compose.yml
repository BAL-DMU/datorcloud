##############################################################
## Docker Compose File for DuckDB and MinIO Services

## This compose docker must to pre-load the docker images for DuckDB and MinIO services.
## The images are available in the local repository docker folder: duckdb_image.tar and minio_image.tar
## To load the images, use the following commands:
## docker load -i docker/duckdb_image.tar
## docker load -i docker/minio_image.tar
## docker load -i docker/python_image.tar

## To run the docker compose, use the following command:
## docker-compose up -d

## If you do want to connect to DuckDB later, you can do:
## docker exec -it duckdb bash or docker exec -it duckdb duckdb

## To stop the services, use the following command:
## docker-compose down
##############################################################


version: "3.8"

services:
  # -----------------------------------------------------
  # DuckDB Service
  # -----------------------------------------------------
  duckdb:
    image: jagh1729/duckdb:latest
    container_name: duckdb
    volumes:
      - .:/orx-surgdatahub
    ports:
      - "8001:8001"
    stdin_open: true
    tty: true
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_USE_SSL=false
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    depends_on:
      - minio
    networks:
      - minio_network

  # -----------------------------------------------------
  # MinIO Service
  # -----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - minio_network

  # -----------------------------------------------------
  # Python Runner Service (Ubuntu 22.04 + Python 3.10)
  # -----------------------------------------------------
  python-runner:
    image: my-python-service:latest       # <-- Use the same name/tag built & saved by the script
    container_name: python-runner
    depends_on:
      - duckdb
      - minio
    networks:
      - minio_network
    # volumes:
    #   - .:/app
    # environment:
    #   - S3_ENDPOINT=http://minio:9000
    #   - S3_USE_SSL=false
    #   - S3_REGION=us-east-1
    #   - S3_ACCESS_KEY=minioadmin
    #   - S3_SECRET_KEY=minioadmin
    # command: ["python", "/app/src/orx-surghub/duckdb_database_creation.py"]
    volumes:
      - .:/app
    tty: true             # keep TTY open
    stdin_open: true      # optional if you want an interactive shell
    command: ["/bin/sh", "-c", "tail -f /dev/null"]

volumes:
  minio_data:

networks:
  minio_network: