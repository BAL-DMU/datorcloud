name: tests

on:
  push:
    branches: [main, datorcloud-component]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dagster,test]"

      - name: Lint
        run: |
          python -m pip install ruff
          ruff check datorcloud tests
        continue-on-error: true

      - name: Run tests
        run: pytest --cov=datorcloud --cov-report=term-missing -q
