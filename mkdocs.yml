site_name: DatorCloud Framework Documentation
site_description: Documentation for the DatorCloud Framework — a lightweight, self-hosted cloud framework for managing, querying, and sharing multimodal research data.
site_author: Dr. John Anderson Garcia-Henao — Digital Medicine Unit / OR-X Translational Center for Surgery / Balgrist University Hospital

nav:
  - Overview: 01_overview/overview.md
  - Installation: 02_installation/installing_core_data_platform.md
  - Component Architecture: 03_components/architecture.md
  - User Guide:
      - Quickstart: 04_user_guide/quickstart.md
      - Tutorial — 4dor-dataset: 04_user_guide/tutorial_4dor.md
      - Tutorial — Dagster Workflows: 04_user_guide/tutorial_dagster.md
      - Python API: 04_user_guide/python_api.md
      - CLI: 04_user_guide/cli.md
      - Dagster Integration: 04_user_guide/dagster.md
  - Contributing: 05_contributing/contributing.md

theme:
  name: readthedocs
  logo: assets/datorcloud-logo.png
  favicon: favicon.ico
  navigation_depth: 1
  collapse_navigation: false
  titles_only: false

markdown_extensions:
  - plantuml_markdown:
      server: http://www.plantuml.com/plantuml
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

plugins:
  - search

not_in_nav: |
  README.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BAL-DMU/orx-surghub

copyright: '&copy; 2024-2026 Balgrist University Hospital · OR-X Translational Center for Surgery'